services:
  # FastAPI backend.
  # Uses a paid plan because persistent disks are not available on Render free web services.
  - type: web
    runtime: python
    name: risk-calc-spfi-backend
    region: frankfurt
    plan: starter
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && PYTHONPATH=. uvicorn option_risk.api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - backend/**
        - datasets/**
        - render.yaml
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.13
      - key: OPTION_RISK_MARKET_SESSION_ROOT
        value: /var/data/market_sessions
      - key: OPTION_RISK_CORS_ALLOW_ORIGINS
        value: https://risk-calc-spfi-frontend.onrender.com
    disk:
      name: market-data
      mountPath: /var/data
      sizeGB: 10

  # Static React/Vite frontend.
  # If you rename either service in Render, update VITE_API_BASE_URL and
  # OPTION_RISK_CORS_ALLOW_ORIGINS to the new public onrender.com hostnames.
  - type: web
    runtime: static
    name: risk-calc-spfi-frontend
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: ./frontend/dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - frontend/**
        - render.yaml
    envVars:
      - key: VITE_API_BASE_URL
        value: https://risk-calc-spfi-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
